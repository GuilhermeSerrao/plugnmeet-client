<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>plugNmeet dashboard — login</title>
<style>
  :root { --bg: #0f172a; --surface: #1e293b; --accent: #3b82f6; --text: #e2e8f0; --danger: #ef4444; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
  form { background: var(--surface); padding: 2rem; border-radius: 12px; width: 100%; max-width: 320px; }
  h1 { font-size: 1.2rem; margin: 0 0 1.2rem; }
  label { display: block; font-size: 0.85rem; margin-bottom: 0.4rem; opacity: 0.8; }
  input { width: 100%; padding: 0.7rem; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: var(--text); font-size: 1rem; }
  button { width: 100%; margin-top: 1.2rem; padding: 0.7rem; border: none; border-radius: 6px; background: var(--accent); color: white; font-size: 1rem; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: default; }
  .error { color: var(--danger); font-size: 0.85rem; margin-top: 0.8rem; min-height: 1.2rem; }
</style>
</head>
<body>
<form id="loginForm">
  <h1>plugNmeet dashboard</h1>
  <label>Password</label>
  <input id="password" type="password" required autofocus>
  <button type="submit">Log in</button>
  <p class="error" id="error"></p>
</form>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const button = e.target.querySelector('button');
  const errorEl = document.getElementById('error');
  button.disabled = true;
  errorEl.textContent = '';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('password').value }),
    });
    const data = await res.json();
    if (data.status) {
      location.href = '/';
    } else {
      throw new Error(data.msg || 'Login failed');
    }
  } catch (err) {
    errorEl.textContent = err.message;
    button.disabled = false;
  }
});
</script>
</body>
</html>
